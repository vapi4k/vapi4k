# detekt 2.x configuration.
#
# This file holds ONLY the project's deliberate deviations from detekt's
# defaults. Everything else is inherited because the Gradle config sets
# `buildUponDefaultConfig = true` (see root build.gradle.kts).
#
# Rule renames vs the old detekt 1.x config this replaced:
#   complexity > LongParameterList > functionThreshold  -> allowedFunctionParameters
#   complexity > LongParameterList > constructorThreshold -> allowedConstructorParameters

config:
  validation: true
  warningsAsErrors: false
  excludes: []

complexity:
  LongMethod:
    allowedLines: 140  # detekt default is 60
  LongParameterList:
    allowedFunctionParameters: 10     # PRA: default is 6
    allowedConstructorParameters: 10  # PRA: default is 7
  TooManyFunctions:
    excludes: ['**/test/**', '**/commonTest/**', '**/jvmTest/**', '**/jsTest/**']
    allowedFunctionsPerFile: 20
    allowedFunctionsPerClass: 40
    allowedFunctionsPerInterface: 20
    allowedFunctionsPerObject: 40
    allowedFunctionsPerEnum: 20

naming:
  MatchingDeclarationName:
    active: false  # PRA: default is true
  MemberNameEqualsClassName:
    active: false  # PRA: default is true

empty-blocks:
  EmptyFunctionBlock:
    active: false  # intentionally disabled (see CLAUDE.md)

style:
  ForbiddenComment:
    active: false  # PRA: default is true
  MagicNumber:
    active: false  # project disabled MagicNumber entirely
  MaxLineLength:
    active: false  # intentionally disabled (see CLAUDE.md)
  FunctionOnlyReturningConstant:
    active: false  # intentionally disabled (see CLAUDE.md)
  UnusedPrivateProperty:
    active: false  # intentionally disabled (see CLAUDE.md)
